<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsi Redbook Clipper Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="app">
      <section class="card">
        <p class="eyebrow">Obsidian Integration</p>
        <h1>Clipper Options</h1>
        <p class="intro">
          Configure the vault name used by the browser when opening `obsidian://` links.
        </p>

        <label class="field">
          <span>Vault Name</span>
          <input id="vaultName" type="text" placeholder="Obsidian Vault">
        </label>

        <label class="field">
          <span>Vault Folder</span>
          <input id="folderPath" type="text" placeholder="Inbox/Xiaohongshu">
        </label>

        <button id="saveBtn" type="button">Save</button>
        <p id="status" class="status"></p>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
